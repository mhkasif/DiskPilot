name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ── macOS ────────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build & Publish macOS
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:mac -- --publish always

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build & Publish Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win -- --publish always

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build & Publish Linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux -- --publish always

  # ── Release Notes ────────────────────────────────────────────────────────────
  release-notes:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for release to exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          echo "Waiting for release with tag $TAG ..."
          for i in $(seq 1 30); do
            if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
              echo "Release found!"
              break
            fi
            echo "Attempt $i — release not found yet, waiting 10s ..."
            sleep 10
          done

      - name: Update release with notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release edit "$TAG" \
            --repo "${{ github.repository }}" \
            --title "DiskPilot $TAG" \
            --draft=false \
            --latest \
            --notes "## DiskPilot $TAG

          Your disk space, visualized & reclaimed.

          ### Downloads
          | Platform | File |
          |----------|------|
          | macOS (Apple Silicon + Intel) | \`DiskPilot-*.dmg\` |
          | Windows 64-bit | \`DiskPilot-*.exe\` |
          | Linux AppImage | \`DiskPilot-*.AppImage\` |
          | Linux Debian | \`DiskPilot-*.deb\` |

          ### Install
          - **macOS**: Open the \`.dmg\`, drag DiskPilot to Applications
          - **Windows**: Run the \`.exe\` installer
          - **Linux**: \`chmod +x DiskPilot-*.AppImage && ./DiskPilot-*.AppImage\`

          ---
          📧 mhkasif97@gmail.com"
